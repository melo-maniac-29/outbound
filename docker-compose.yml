services:
  postgres:
    image: postgres:16
    container_name: outbound_postgres
    environment:
      POSTGRES_DB: outbound
      POSTGRES_USER: outbound
      POSTGRES_PASSWORD: outbound
    volumes:
      - outbound_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outbound -d outbound"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: outbound_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://outbound:outbound@postgres:5432/outbound
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  adminer:
    image: adminer:4
    container_name: outbound_adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  outbound_postgres_data:
